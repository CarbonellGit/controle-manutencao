# .github/workflows/deploy.yml

name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # Roda quando houver push na branch 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Create Firebase config file 🤫
        run: |
          echo "const firebaseConfig = ${{ secrets.FIREBASE_CONFIG_OBJECT }};" > firebase-config.js
        
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages # A branch para onde o deploy será feito
          folder: .       # A pasta contendo os arquivos do site (neste caso, a raiz)